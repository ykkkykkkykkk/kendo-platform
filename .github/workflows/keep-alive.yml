name: keep-alive

# Render 무료 플랜은 15분 유휴 시 서버가 잠들어(콜드스타트) 첫 응답이 30~60초 걸린다.
# 10분마다 /health 를 찔러 서버를 깨워두면 커뮤니티 방문자도 항상 즉시 접속된다.

on:
  schedule:
    - cron: '*/10 * * * *'   # 10분마다 (GitHub 스케줄은 약간 지연될 수 있음)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          echo "Pinging backend to keep it warm..."
          code=$(curl -sS -m 40 -o /dev/null -w "%{http_code}" https://kendo-platform-api.onrender.com/health || echo "000")
          echo "HTTP $code"
          # 콜드스타트 중이면 503이 날 수 있으나, 이 요청 자체가 서버를 깨우므로 실패 처리하지 않음
          exit 0
